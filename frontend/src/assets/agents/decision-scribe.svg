<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512"
     height="512"
     role="img"
     aria-label="决策记录员">
  <title>决策记录员</title>
  <defs>
    <radialGradient id="bg-decision-scribe" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1a2236" />
      <stop offset="55%" stop-color="#0f1626" />
      <stop offset="100%" stop-color="#050810" />
    </radialGradient>
    <radialGradient id="rim-decision-scribe" cx="22%" cy="18%" r="42%">
      <stop offset="0%" stop-color="#ffb86b" stop-opacity="0.42" />
      <stop offset="60%" stop-color="#ffb86b" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#ffb86b" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="accent-decision-scribe" cx="50%" cy="58%" r="48%">
      <stop offset="0%" stop-color="#b794ff" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#b794ff" stop-opacity="0" />
    </radialGradient>
    <filter id="soft-decision-scribe" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.4" />
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="64" ry="64" fill="url(#bg-decision-scribe)" />
  <!-- warm amber rim light -->
  <rect width="512" height="512" rx="64" ry="64" fill="url(#rim-decision-scribe)" />
  <!-- role-tinted center wash -->
  <rect width="512" height="512" rx="64" ry="64" fill="url(#accent-decision-scribe)" />

  <!-- accent ring -->
  <circle cx="256" cy="256" r="170"
          fill="none"
          stroke="#b794ff"
          stroke-opacity="0.85"
          stroke-width="4" />
  <circle cx="256" cy="256" r="170"
          fill="none"
          stroke="#b794ff"
          stroke-opacity="0.18"
          stroke-width="14" />

  <!-- glyph -->
  <g filter="url(#soft-decision-scribe)"
     fill="none"
     stroke="#b794ff"
     stroke-width="10.0"
     stroke-linecap="round"
     stroke-linejoin="round"
     opacity="0.95">
    <path d="M 196 212 L 316 212 M 196 240 L 280 240 M 196 268 L 316 268 M 196 296 L 256 296 M 196 324 L 296 324" />
  </g>

  <!-- initials (CJK so works as a fallback identifier even when rendered tiny) -->
  <text x="256" y="430"
        text-anchor="middle"
        font-family="'PingFang SC', 'Microsoft YaHei', 'Source Han Sans SC', 'Hiragino Sans GB', sans-serif"
        font-size="44"
        font-weight="600"
        fill="#b794ff"
        opacity="0.92">录</text>
</svg>
